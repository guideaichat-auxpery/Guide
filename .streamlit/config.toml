[server]
headless = true
address = "0.0.0.0"
port = 8080
enableXsrfProtection = false
enableCORS = false
maxUploadSize = 200
maxMessageSize = 200
runOnSave = true

[browser]
gatherUsageStats = false

[runner]
magicEnabled = true
fastReruns = true

[client]
showErrorDetails = true
toolbarMode = "minimal"

[theme]
primaryColor = "#9bbf9b"
backgroundColor = "#fffdf8"
secondaryBackgroundColor = "#f5f1e6"
textColor = "#2f3e46"
font = "sans serif"
