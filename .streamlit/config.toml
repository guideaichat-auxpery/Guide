[server]
headless = true
address = "0.0.0.0"
port = 5000
enableXsrfProtection = true
maxUploadSize = 200
maxMessageSize = 200
runOnSave = true

[browser]
gatherUsageStats = false
serverAddress = "0.0.0.0"
serverPort = 5000

[runner]
magicEnabled = true
fastReruns = true

[client]
showErrorDetails = true
toolbarMode = "minimal"
font = "Inter"

[theme]
primaryColor = "#333333"
backgroundColor = "#FFFEFA"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#333333"
font = "sans serif"
