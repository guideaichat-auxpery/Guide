[server]
headless = true
address = "0.0.0.0"
port = 5000
enableXsrfProtection = true
maxUploadSize = 200

[browser]
gatherUsageStats = false
serverAddress = "0.0.0.0"
serverPort = 5000

[runner]
magicEnabled = true
fastReruns = true

[client]
showErrorDetails = true
toolbarMode = "minimal"

[server.session]
maxRunTime = 7200
sessionTimeout = 7200

[theme]
primaryColor = "#9bbf9b"
backgroundColor = "#fffdf8"
secondaryBackgroundColor = "#f5f1e6"
textColor = "#2f3e46"
font = "sans serif"
