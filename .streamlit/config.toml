[server]
headless = true
address = "0.0.0.0"
port = 5000
enableCORS = false
enableXsrfProtection = false
maxUploadSize = 200
maxMessageSize = 200
runOnSave = true

[browser]
gatherUsageStats = false

[runner]
magicEnabled = true
fastReruns = true

[client]
showErrorDetails = true
toolbarMode = "minimal"

[theme]
primaryColor = "#333333"
backgroundColor = "#FFFEFA"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#333333"
font = "sans serif"

# Session Configuration
# Users stay logged in indefinitely like ChatGPT
# Session state persists across reruns and browser refreshes
# No automatic timeouts or force logouts
# Users must manually click "Logout" to clear session
